name: "Test"

on:
    pull_request:
        branches: [dev] # Executa quando abrir PR para a dev

jobs:
    test:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            pull-requests: write

        steps:
            - uses: actions/checkout@v4

            # 1. Instalar o pnpm antes de tudo
            - uses: pnpm/action-setup@v3
              with:
                  version: 9 # Use a versão que você tem local

            - name: "Install Node"
              uses: actions/setup-node@v4
              with:
                  node-version: "20.x"
                  cache: "pnpm" # Ativa o cache automático do pnpm

            - name: "Install Deps"
              # --frozen-lockfile garante que o CI use exatamente o pnpm-lock.yaml
              run: pnpm install --frozen-lockfile

            - name: "Run Unit Tests"
              # Executa os testes em todos os pacotes do monorepo
              run: pnpm -r test -- --coverage.enabled true

            - name: "Report Coverage"
              if: always()
              uses: davelosert/vitest-coverage-report-action@v2
