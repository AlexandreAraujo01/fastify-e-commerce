services:
  postgres:
    image: postgres:16-alpine
    container_name: FASTIFY-E-COMMERCE-DB
    environment:
      POSTGRES_USER: alex
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: FASTIFYECOMMMERCE
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data



volumes:
  postgres_data:

